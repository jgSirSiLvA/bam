<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="pictures/favicon.png">

<title>the Build A Minifigure Archive</title>

<style>
:root{--bg:#222;--card:#333;--text:#eee;--border:#666;--badge:#ffcf00;--shadow:0 2px 8px rgba(0,0,0,.15);}
body{margin:20px;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);}
h1{margin: 0; padding: 0; text-align:center;}
#toolbar{display:flex;gap:15px;align-items:center;flex-wrap:wrap;margin-bottom:20px;}
select,input,button{padding:6px 10px;font-size:15px;}
#counter{margin-left:auto;font-weight:bold;}
#cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:10px;}

  #byline { color: #E3000B; text-align: center; }

.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:15px;box-shadow:var(--shadow);}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.month{font-size:22px;font-weight:bold;}
.grid{display:grid;grid-template-columns:220px 110px 110px;grid-template-rows:110px 110px 110px;gap:8px;}

.figure{grid-row:1/span 3;display:flex;justify-content:center;align-items:center;border:1px solid var(--border);cursor:pointer;overflow:hidden;}
.figure img{max-width:100%;max-height:100%;}

.part{border:1px solid var(--border);padding:0;overflow:hidden;}
.part img{display:block;width:100%;height:100%;object-fit:contain;}
.part a{text-decoration:none;color:inherit;}
.accessory{grid-column:2/span 2;}

.notes{margin-top:12px;}
.badges{margin-bottom:8px;}
.badge{display:inline-block;background:var(--badge);color:#000;font-weight:bold;padding:3px 7px;border-radius:4px;margin:2px;}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;justify-content:center;align-items:center;z-index:999;}
.modal img{max-width:90%;max-height:90%;}
</style>

</head>
<body class="dark">

<h1>the Build A Minifigure Archive</h1>
<div id="byline">inspired and based on work by Steinreich</div>
<div id="toolbar">
<select id="year">
<option selected>2026</option>
<option>2025</option>
<option>2024</option>
<option>2023</option>
<option>2022</option>
<option>2021</option>
<option>2020</option>
<option>2019</option>
<option>2018</option>
</select>

<input id="search" type="text" placeholder="Search...">



<div id="counter">Showing 0 of 0 figures</div>
</div>

<div id="cards"></div>

<div id="modal" class="modal"><img id="modalImage"></div>

<script>

const cards=document.getElementById("cards");
const search=document.getElementById("search");
const year=document.getElementById("year");
const counter=document.getElementById("counter");
const modal=document.getElementById("modal");
const modalImage=document.getElementById("modalImage");

let figures=[];

function closeModal(){
    modal.style.display="none";
}

modal.addEventListener("click",closeModal);
document.addEventListener("keydown",closeModal);

year.onchange=loadYear;
search.oninput=render;

loadYear();

async function loadYear(){
    const response=await fetch("data/"+year.value+".json?_=" + Date.now() );
    const json=await response.json();
    figures=json.bamfigs;
    render();
}

function render(){
    cards.innerHTML="";
    const text=search.value.toLowerCase();
    const filtered=figures.filter(f=>JSON.stringify(f).toLowerCase().includes(text));
    counter.textContent="Showing "+filtered.length+" of "+figures.length+" figures";
    filtered.forEach((fig,index)=>cards.appendChild(createCard(fig,index)));
}

function partImage(color_id,part_id){
    return "https://img.bricklink.com/ItemImage/PN/"+color_id+"/"+part_id+".png";
}

function partLink(id, color){
    return "https://www.bricklink.com/v2/catalog/catalogitem.page?P="+id+"&C="+color;
}

function figureImage(fig){
    if (fig.figure_id && fig.figure_id !== "null") { return "https://img.bricklink.com/ItemImage/MN/0/"+fig.figure_id+".png"; }
    if (fig.figure_picture && fig.figure_picture !== "null") { return fig.figure_picture.startsWith("https://") ? fig.figure_picture : "pictures/" + fig.figure_picture; }
    return "https://brick2d2.com/cdn/shop/files/myteryminifigur.png";
}

function partBox(part){
    if (!part || part === "null" || !part.id || part.id === "null") {
        const empty = document.createElement("div");
        empty.className = "part";
        return empty;
    }

    const div=document.createElement("div");
    div.className="part";
    div.innerHTML=`
        <a href="${partLink(part.id, part.color_id)}" target="_blank">
            <img src="${partImage(part.color_id,part.id)}" onerror="this.src='https://placehold.co/110?text=?'">
        </a>
    `;
    return div;
}


function parseBadges(note){

    if(!note) return "";

    const badges=[];

    const n=note.toLowerCase();

    if(n.includes("alles")){
        badges.push("Headgear","Head","Torso","Legs","Accessory");
    }else{
        if(n.includes("kopfbedeck")) badges.push("Headgear");
        if(n.includes("haare")) badges.push("Headgear");
        if(n.includes("kopf")) badges.push("Head");
        if(n.includes("ober")) badges.push("Torso");
        if(n.includes("hose")) badges.push("Legs");
        if(n.includes("bein")) badges.push("Legs");
        if(n.includes("rock")) badges.push("Legs");
        if(n.includes("schwert")) badges.push("Accessory");
        if(n.includes("fliese")) badges.push("Accessory");
        if(n.includes("zubehör")) badges.push("Accessory");
        if(n.includes("schlange")) badges.push("Accessory");
        if(n.includes("tail")) badges.push("Accessory");
        if(n.includes("einzelteil")) badges.push("All parts");
        if(n.includes("zubeh")) badges.push("Accessory");
    }

    return [...new Set(badges)]
        .map(x=>`<span class="badge">${x}</span>`)
        .join("");
}

function createCard(fig,index){

    const card=document.createElement("div");
    card.className="card";

    const grid=document.createElement("div");
    grid.className="grid";

    const figure=document.createElement("div");
    figure.className="figure";

    figure.innerHTML=`<img src="${figureImage(fig)}">`;

    figure.onclick=()=>{
        modalImage.src=figureImage(fig);
        modal.style.display="flex";
    };

    grid.appendChild(figure);

    grid.appendChild(partBox(fig.headgear));
    grid.appendChild(partBox(fig.head));
    grid.appendChild(partBox(fig.torso));
    grid.appendChild(partBox(fig.pants));

    const accessory=partBox(fig.accessory);
    accessory.classList.add("accessory");
    grid.appendChild(accessory);

    card.innerHTML=`
        <div class="header">
            <div class="month">${fig.month ? fig.month + ' ' : ''}${fig.figure_name || ''}</div>
            <div>#${index+1}</div>
        </div>
    `;

    card.appendChild(grid);

    const notes=document.createElement("div");
    notes.className="notes";

    notes.innerHTML=`
        <div class="badges">${parseBadges(fig.note)}</div>

        ${fig.color_notes?`<b>Notes:</b> ${fig.color_notes}`:""}
    `;

    card.appendChild(notes);

    return card;
}

</script>

</body>
</html>
